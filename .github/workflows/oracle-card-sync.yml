name: Sync Oracle Card Data

on:
  schedule:
    - cron: '45 4 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync_oracle_cards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync oracle card metadata
        run: npm run sync:oracle-cards
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
