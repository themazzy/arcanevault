<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
  // Apply saved theme instantly before React boots to prevent flash of wrong theme.
  // Reads the vars cache written by applyTheme() in SettingsContext.jsx.
  // On the scanner route (native), mark html so CSS keeps everything transparent
  // for the camera preview behind the WebView.
  (function() {
    try {
      var isScanner = /\/scanner\/?$/.test(window.location.pathname);
      if (isScanner) {
        document.documentElement.setAttribute('data-scanner', 'true');
      }
      // Don't apply saved theme on the login page — show default always
      var isLogin = /\/(login|join\/|share\/)/.test(window.location.pathname);
      var cached = !isLogin && localStorage.getItem('arcanevault_theme_cache');
      if (cached) {
        var t = JSON.parse(cached);
        var root = document.documentElement;
        var vars = t.vars;
        if (vars) {
          for (var k in vars) {
            if (Object.prototype.hasOwnProperty.call(vars, k)) {
              root.style.setProperty(k, vars[k]);
            }
          }
        }
        if (t.mode === 'light') {
          root.setAttribute('data-theme-mode', 'light');
        }
        if (t.oled) {
          var oled = {
            '--bg':'#000000',
            '--bg2':'#000000',
            '--bg3':'#000000',
            '--s1':'#000000',
            '--s2':'#000000',
            '--s3':'#000000',
            '--s4':'#000000'
          };
          for (var ok in oled) root.style.setProperty(ok, oled[ok]);
        }
      }
    } catch(e) {}
  })();
</script>
    <script type="text/javascript">
  // This script checks if we were redirected from the 404 page
  (function(l) {
    if (l.search[1] === '/' ) {
      var decoded = l.search.slice(1).split('&').map(function(s) { 
        return s.replace(/~and~/g, '&')
      }).join('?');
      window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
      );
    }
  }(window.location))
</script>

    <!-- Non-render-blocking font loading: preload as style, then swap to stylesheet on load -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300..700;1,300..700&family=Inter:wght@300..700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>

        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300..700;1,300..700&family=Inter:wght@300..700&display=swap"
      />
    </noscript>
  </head>
