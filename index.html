<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
  // Apply saved theme instantly before React boots to prevent flash of wrong theme.
  // Reads the vars cache written by applyTheme() in SettingsContext.jsx.
  (function() {
    try {
      var cached = localStorage.getItem('arcanevault_theme_cache');
      if (cached) {
        var t = JSON.parse(cached);
        var root = document.documentElement;
        var vars = t.vars;
        if (vars) {
          for (var k in vars) {
            if (Object.prototype.hasOwnProperty.call(vars, k)) {
              root.style.setProperty(k, vars[k]);
            }
          }
        }
        if (t.mode === 'light') {
          root.setAttribute('data-theme-mode', 'light');
        }
      }
    } catch(e) {}
  })();
</script>
    <script type="text/javascript">
  // This script checks if we were redirected from the 404 page
  (function(l) {
    if (l.search[1] === '/' ) {
      var decoded = l.search.slice(1).split('&').map(function(s) { 
        return s.replace(/~and~/g, '&')
      }).join('?');
      window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
      );
    }
  }(window.location))
</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcaneVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
