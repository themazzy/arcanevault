<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm your Deck Loom action</title>
  </head>
  <body style="margin:0;padding:0;background:#090a0d;color:#f4efe3;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
    <div style="padding:32px 16px;background:#090a0d;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:640px;margin:0 auto;background:#121318;border:1px solid #2c2b26;border-radius:14px;overflow:hidden;">
        <tr>
          <td style="padding:28px 32px 22px;border-top:4px solid #d7b35d;border-bottom:1px solid #2c2b26;">
            <div style="font-size:13px;line-height:1;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:#d7b35d;">Deck Loom</div>
            <h1 style="margin:14px 0 0;font-size:28px;line-height:1.2;font-weight:800;color:#f8f3e7;">Confirm it is you</h1>
            <p style="margin:10px 0 0;font-size:15px;line-height:1.6;color:#bdb7aa;">Enter this one-time code to continue.</p>
          </td>
        </tr>
        <tr>
          <td style="padding:30px 32px 8px;font-size:16px;line-height:1.65;color:#e9e1d0;">
            <p style="margin:0 0 18px;">Deck Loom needs to verify this account action.</p>
            <div style="margin:0 0 24px;padding:18px 22px;background:#0c0d11;border:1px solid #2c2b26;border-radius:10px;text-align:center;">
              <div style="font-size:12px;line-height:1.4;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:#9f8ee8;margin-bottom:10px;">One-time code</div>
              <div style="font-size:34px;line-height:1;font-weight:900;letter-spacing:8px;color:#f8f3e7;">{{ .Token }}</div>
            </div>
          </td>
        </tr>
        <tr>
          <td style="padding:18px 32px 30px;font-size:13px;line-height:1.6;color:#9e9788;">
            If you did not request this verification, you can ignore this email.
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
