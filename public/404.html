<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>DeckLoom</title>
    <script type="text/javascript">
      // This script takes the current URL (the one that 404'd) 
      // and converts it into a search parameter for index.html
      var l = window.location;
      var pathSegmentsToKeep = /\.github\.io$/.test(l.hostname) ? 1 : 0;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
